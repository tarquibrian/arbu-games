<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(circle at 30% 20%, #1b4a31 0%, transparent 45%),
      radial-gradient(circle at 80% 80%, #143a26 0%, transparent 50%),
      #0a1610;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes growUp {
    0%   { transform: scaleY(0.55) scaleX(0.9); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: scaleY(1) scaleX(1); opacity: 1; }
  }
  #root { transform-origin: center center; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="trees.jsx"></script>
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <div style={{ position: 'relative' }}>
          <IOSDevice dark>
            <div style={{ position: 'absolute', inset: 0 }}>
              <Onboarding />
            </div>
          </IOSDevice>
        </div>
      );
    }

    function fit() {
      const root = document.getElementById('root');
      const pad = 32;
      const s = Math.min(
        (window.innerWidth - pad) / 402,
        (window.innerHeight - pad) / 874,
        1
      );
      root.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    setTimeout(fit, 50);
  </script>
</body>
</html>
